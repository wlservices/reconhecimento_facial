<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style-login.css')}}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modal.css')}}">
    <title>Primeiro Acesso</title>
</head>
<body>

    {% include 'includes/_modal.html' %}

    <div class="card-effect">
        <div class="box">
            <div class="content">
                <div class="title-box">
                    <h2>Cadastro do Administrador</h2>
                </div>
                <form method="POST" action="{{ url_for('view.first_access') }}">
                    <label for="username" class="form-group">Usuário:</label>
                    <input type="text" name="username" class="form-control" id="username" required><br><br>

                    <label for="password" class="form-group">Senha:</label>
                    <input type="password" name="password" class="form-control" id="password" required><br><br>

                    <button class="btn-save" type="submit">Cadastra e Entrar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
