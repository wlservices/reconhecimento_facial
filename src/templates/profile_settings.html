{% extends 'base.html' %}

{% block title %}
    <title>
        {{ current_user.username }} - Configurações
    </title>
{% endblock %}

{% block section %}
<div class="content-box">
    <h2 style="margin-bottom: 25px; color: var(--text-main);">⚙️ Configurações de Perfil</h2>

    <div class="settings-card">
        <form id="profile-form" action="{{ url_for('view.update_profile') }}" method="POST" enctype="multipart/form-data">
            
            <div class="photo-upload-wrapper">
                <div id="image-container">
                    {% if current_user.photo %}
                        <img src="{{ url_for('static', filename=current_user.photo) }}" class="preview-photo" id="image-preview">
                    {% else %}
                        <div class="avatar-fallback" id="image-preview">
                            {{ current_user.username[:2] | upper }}
                        </div>
                    {% endif %}
                </div>
                
                <label for="photo-input" style="cursor:pointer; color: var(--primary-color); margin-top: 15px; font-size: 14px; font-weight: 600;">
                    <i class="fas fa-camera"></i> Alterar foto de perfil
                </label>
                <input type="file" id="photo-input" accept="image/*" style="display: none;">
                
                <input type="hidden" name="cropped_image" id="cropped_image">
            </div>

            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" class="form-control" value="{{ current_user.username }}" placeholder="Seu nome">
            </div>

            <button type="submit" class="btn-save">
                <i class="fas fa-check-circle"></i> Salvar Alterações
            </button>
        </form>
    </div>
</div>

<div id="cropper-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-bottom: 15px; color: var(--text-main);">Ajustar Foto</h3>
        <div class="cropper-wrapper">
            <img id="image-to-crop">
        </div>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button type="button" onclick="closeModal()" style="background:#eee; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight: 600; color: #666;">Cancelar</button>
            <button type="button" id="btn-confirm-crop" class="btn-save" style="width: auto; padding: 10px 25px;">Confirmar</button>
        </div>
    </div>
</div>

{% endblock %}
